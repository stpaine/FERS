---
name: 🐛 Bug Report
description: Create a report to help us improve the FERS simulator or UI.
title: '[Bug] '
labels: ['type: bug', 'status: triage']
body:
    - type: dropdown
      id: scope
      attributes:
          label: Affected Package / Scope
          description: Which part of the project is affected by this bug?
          options:
              - Core Simulator (libfers / fers-cli)
              - Desktop UI (fers-ui)
              - XML Schema (schema)
              - Build Process / CI
              - Testing Framework
              - Not Sure / General
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: Bug Description
          description: A clear and concise description of what the bug is.
      validations:
          required: true

    - type: textarea
      id: steps-to-reproduce
      attributes:
          label: Steps to Reproduce
          description: Please provide steps to reproduce the behavior. If applicable, attach a minimal XML scenario file by dragging it into this text box.
      validations:
          required: true

    - type: textarea
      id: expected-behavior
      attributes:
          label: Expected vs. Actual Behavior (Optional)
          description: What did you expect to happen, and what actually happened? Include logs, error messages, or screenshots if helpful.
      validations:
          required: false

    - type: textarea
      id: environment
      attributes:
          label: Environment (Optional)
          description: Please provide details about the environment where you encountered the bug.
          placeholder: |
              - OS: [e.g., Ubuntu 24.04, Windows 11, macOS Sonoma]
              - Compiler/Toolchain: [e.g., MSVC v143, Clang 16]
              - FERS UI Version: [e.g., v0.1.0]
      validations:
          required: false
