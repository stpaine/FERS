---
name: Core CI

on:
    push:
        branches: ['master']
    pull_request:
        branches: ['master']

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
    build-and-test:
        name: Build & Test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-24.04, ubuntu-24.04-arm, macos-26-intel, macos-26]

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y xxd pkg-config build-essential

            - name: Get CMake
              uses: lukka/get-cmake@latest

            - name: Setup ccache
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: ${{ matrix.os }}-coverage
                  variant: ccache
                  max-size: 500M

            - name: Configure ccache environment
              shell: bash
              run: |
                  echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
                  echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
                  # Let vcpkg's port builds inherit ccache + the GHA cache credentials.
                  echo "VCPKG_KEEP_ENV_VARS=ACTIONS_CACHE_URL;ACTIONS_RUNTIME_TOKEN;CMAKE_C_COMPILER_LAUNCHER;CMAKE_CXX_COMPILER_LAUNCHER" >> "$GITHUB_ENV"

            - name: Setup vcpkg
              uses: lukka/run-vcpkg@v11
              with:
                  vcpkgDirectory: ${{ github.workspace }}/vcpkg
                  vcpkgJsonGlob: 'vcpkg.json'
                  runVcpkgInstall: true
                  doNotCache: false

            - name: Configure CMake (coverage)
              run: cmake --preset=coverage

            - name: Build (coverage)
              run: cmake --build --preset=coverage

            - name: Run Tests
              run: ctest --preset=coverage --output-on-failure

            - name: ccache stats
              if: always()
              shell: bash
              run: ccache --show-stats
