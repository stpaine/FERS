---
name: UI CI

on:
    push:
        branches: ['master']
    pull_request:
        branches: ['master']

# Cancel in-progress runs for the same branch/PR to save resources
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    MACOSX_DEPLOYMENT_TARGET: '14.0'

jobs:
    lint-ui:
        name: Lint UI (biome)
        runs-on: ubuntu-24.04
        timeout-minutes: 10
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install JS Dependencies
              run: bun install

            - name: Run biome lint
              run: bun run --filter fers-ui lint

    build-ui:
        name: Build UI (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        timeout-minutes: 60
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-24.04
                      vcpkg_triplet: x64-linux
                      rust_target: x86_64-unknown-linux-gnu
                    - os: ubuntu-24.04-arm
                      vcpkg_triplet: arm64-linux
                      rust_target: aarch64-unknown-linux-gnu
                    - os: macos-26-intel
                      vcpkg_triplet: x64-osx
                      rust_target: x86_64-apple-darwin
                    - os: macos-26
                      vcpkg_triplet: arm64-osx
                      rust_target: aarch64-apple-darwin
                    - os: windows-2025
                      vcpkg_triplet: x64-windows-static-md
                      rust_target: x86_64-pc-windows-msvc
                      msvc_arch: x64
                    - os: windows-11-arm
                      vcpkg_triplet: arm64-windows-static-md
                      rust_target: aarch64-pc-windows-msvc
                      msvc_arch: arm64
        env:
            VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
            VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Install Linux dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y pkg-config build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libwebkit2gtk-4.1-dev xdg-utils

            - name: Get CMake
              uses: lukka/get-cmake@latest

            - name: Setup MSVC
              if: runner.os == 'Windows'
              uses: ilammy/msvc-dev-cmd@v1
              with:
                  arch: ${{ matrix.msvc_arch }}

            - name: Force MSVC compilers
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  $linker = (where.exe link.exe | Select-Object -First 1)
                  if (-not $linker) {
                      throw "MSVC link.exe not found"
                  }

                  "CC=cl" >> $env:GITHUB_ENV
                  "CXX=cl" >> $env:GITHUB_ENV
                  "VCPKG_ROOT=${{ github.workspace }}\vcpkg" >> $env:GITHUB_ENV
                  "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linker" >> $env:GITHUB_ENV
                  "CARGO_TARGET_AARCH64_PC_WINDOWS_MSVC_LINKER=$linker" >> $env:GITHUB_ENV

            - name: Verify build tools
              shell: bash
              run: |
                  cmake --version
                  ninja --version

            - name: Setup ccache
              if: runner.os != 'Windows'
              uses: hendrikmuhs/ccache-action@v1.2
              with:
                  key: ui-${{ matrix.os }}
                  variant: ccache
                  max-size: 500M

            - name: Configure vcpkg downloads
              shell: bash
              run: |
                  echo "VCPKG_DOWNLOADS=${{ github.workspace }}/.cache/vcpkg/downloads" >> "$GITHUB_ENV"
                  mkdir -p "${{ github.workspace }}/.cache/vcpkg/downloads"

            - name: Configure ccache environment
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
                  echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> "$GITHUB_ENV"
                  # Let vcpkg's port builds inherit ccache + the GHA cache credentials.
                  echo "VCPKG_KEEP_ENV_VARS=ACTIONS_CACHE_URL;ACTIONS_RUNTIME_TOKEN;CMAKE_C_COMPILER_LAUNCHER;CMAKE_CXX_COMPILER_LAUNCHER" >> "$GITHUB_ENV"

            - name: Cache vcpkg downloads
              uses: actions/cache@v5
              with:
                  path: ${{ github.workspace }}/.cache/vcpkg/downloads
                  key: ${{ runner.os }}-vcpkg-downloads-${{ hashFiles('vcpkg.json') }}
                  restore-keys: |
                      ${{ runner.os }}-vcpkg-downloads-

            - name: Setup vcpkg
              uses: lukka/run-vcpkg@v11
              with:
                  vcpkgDirectory: ${{ github.workspace }}/vcpkg
                  vcpkgJsonGlob: 'vcpkg.json'
                  doNotCache: true

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Cache Bun dependencies
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-

            - name: Install Rust toolchain
              run: rustup show

            - name: Install Windows Rust target
              if: runner.os == 'Windows'
              run: rustup target add ${{ matrix.rust_target }}

            - name: Rust Cache
              uses: Swatinem/rust-cache@v2
              with:
                  # Targets the specific workspace directory mapped in your .cargo/config.toml
                  workspaces: 'packages/fers-ui/src-tauri -> target'

            - name: Install JS Dependencies
              run: bun install

            - name: Build UI
              if: runner.os != 'Windows'
              env:
                  CMAKE_GENERATOR: Ninja
                  # Explicitly pass VCPKG_ROOT so build.rs can locate the vcpkg toolchain
                  VCPKG_ROOT: ${{ github.workspace }}/vcpkg
                  VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
                  VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
              shell: bash
              run: |
                  for attempt in 1 2 3; do
                      if bun run ui:build; then
                          exit 0
                      fi

                      if [ "$attempt" -eq 3 ]; then
                          exit 1
                      fi

                      echo "UI build failed on attempt $attempt. Retrying in 15 seconds..."
                      sleep 15
                  done

            - name: Build UI (Windows)
              if: runner.os == 'Windows'
              env:
                  CMAKE_GENERATOR: Ninja
                  # Explicitly pass VCPKG_ROOT so build.rs can locate the vcpkg toolchain
                  VCPKG_ROOT: ${{ github.workspace }}\vcpkg
                  VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}
                  VCPKG_TARGET_TRIPLET: ${{ matrix.vcpkg_triplet }}
              shell: pwsh
              run: |
                  for ($attempt = 1; $attempt -le 3; $attempt++) {
                      bun run ui:build
                      if ($LASTEXITCODE -eq 0) {
                          exit 0
                      }

                      if ($attempt -eq 3) {
                          exit $LASTEXITCODE
                      }

                      Write-Host "UI build failed on attempt $attempt. Retrying in 15 seconds..."
                      Start-Sleep -Seconds 15
                  }

            - name: ccache stats
              if: always() && runner.os != 'Windows'
              shell: bash
              run: ccache --show-stats
